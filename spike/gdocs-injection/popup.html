<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GDocs Injection Spike</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 280px;
        padding: 12px;
        margin: 0;
        color: #222;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px 0;
      }
      p {
        font-size: 12px;
        color: #555;
        margin: 0 0 10px 0;
        line-height: 1.4;
      }
      textarea {
        width: 100%;
        box-sizing: border-box;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        padding: 6px;
        margin-bottom: 8px;
        resize: vertical;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }
      .row label {
        font-size: 12px;
        color: #555;
      }
      .row input[type="number"] {
        width: 64px;
        padding: 4px;
        font-size: 12px;
      }
      button {
        width: 100%;
        padding: 8px;
        font-size: 13px;
        background: #1a73e8;
        color: white;
        border: 0;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #1557b0;
      }
      button.secondary {
        background: #e0e0e0;
        color: #222;
      }
      button.secondary:hover {
        background: #c8c8c8;
      }
      #status {
        margin-top: 10px;
        font-size: 11px;
        color: #555;
        min-height: 28px;
        padding: 6px;
        background: #f5f5f5;
        border-radius: 4px;
        font-family: ui-monospace, monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .warn {
        color: #c03030;
      }
    </style>
  </head>
  <body>
    <h1>GDocs Injection Spike</h1>
    <p>
      Click into a Google Doc first (cursor must be in the document), then
      click the button below.
    </p>

    <textarea id="text" rows="3">Hello from flying fingers! This is a spike to validate character-by-character typing.</textarea>

    <div class="row">
      <label for="delay">Delay (ms):</label>
      <input id="delay" type="number" value="80" min="0" max="2000" step="10" />
    </div>

    <button id="typeBtn">Type test string</button>
    <button id="diagBtn" class="secondary" style="margin-top: 6px">
      Run diagnosis only
    </button>

    <div id="status">Ready.</div>

    <script src="popup.js"></script>
  </body>
</html>
