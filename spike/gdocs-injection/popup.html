<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GDocs Injection Spike</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 300px;
        padding: 12px;
        margin: 0;
        color: #222;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px 0;
      }
      p {
        font-size: 12px;
        color: #555;
        margin: 0 0 10px 0;
        line-height: 1.4;
      }
      .shortcut {
        display: inline-block;
        background: #f5f5f5;
        border: 1px solid #ddd;
        padding: 2px 6px;
        border-radius: 3px;
        font-family: ui-monospace, monospace;
        font-size: 11px;
      }
      textarea {
        width: 100%;
        box-sizing: border-box;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        padding: 6px;
        margin-bottom: 8px;
        resize: vertical;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }
      .row label {
        font-size: 12px;
        color: #555;
      }
      .row input[type="number"] {
        width: 64px;
        padding: 4px;
        font-size: 12px;
      }
      button {
        width: 100%;
        padding: 8px;
        font-size: 13px;
        background: #1a73e8;
        color: white;
        border: 0;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #1557b0;
      }
      button.secondary {
        background: #e0e0e0;
        color: #222;
      }
      button.secondary:hover {
        background: #c8c8c8;
      }
      #status {
        margin-top: 10px;
        font-size: 11px;
        color: #555;
        min-height: 28px;
        padding: 6px;
        background: #f5f5f5;
        border-radius: 4px;
        font-family: ui-monospace, monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .warn {
        color: #c03030;
      }
      .ok {
        color: #080;
      }
      ol {
        font-size: 11px;
        color: #555;
        padding-left: 18px;
        margin: 8px 0;
      }
      ol li {
        margin-bottom: 3px;
      }
    </style>
  </head>
  <body>
    <h1>GDocs Injection Spike</h1>
    <p>
      Set your test string and delay below, click <strong>Save</strong>, then
      focus the Google Doc and press
      <span class="shortcut">Alt+Shift+Y</span> to type it.
    </p>

    <textarea id="text" rows="3">Hello from flying fingers! This is a spike to validate character-by-character typing.</textarea>

    <div class="row">
      <label for="delay">Delay (ms):</label>
      <input id="delay" type="number" value="80" min="0" max="2000" step="10" />
    </div>

    <button id="saveBtn">Save settings</button>
    <button id="diagBtn" class="secondary" style="margin-top: 6px">
      Run diagnosis
    </button>

    <ol>
      <li>Save settings (above)</li>
      <li>Close this popup</li>
      <li>Click into the Google Doc — cursor must be blinking</li>
      <li>Press <span class="shortcut">Alt+Shift+Y</span></li>
    </ol>

    <div id="status">Ready.</div>

    <script src="popup.js"></script>
  </body>
</html>
